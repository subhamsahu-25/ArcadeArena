<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ArcadeArena</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="menu.css"/>
</head>
<body>

  <div class="container">
    <div class="header">
      <p class="eyebrow">SELECT YOUR GAME</p>
      <h1>ARCADE ARENA</h1>
    </div>

    <div class="games">

      <a href="tictactoe.html" class="card">
        <div class="card-icon" style="color: white;">X O</div>
        <div class="card-body">
          <div class="card-title">Tic Tac Toe</div>
          <div class="card-desc">Classic 3×3 grid battle. X vs O. First to three wins.</div>
        </div>
        <div class="card-arrow">→</div>
      </a>

      <a href="tugofwar.html" class="card">
        <div class="card-icon">⚡ 🎯</div>
        <div class="card-body">
          <div class="card-title">Tug of War</div>
          <div class="card-desc">Tap fast or the system pulls you back. Race to the end.</div>
        </div>
        <div class="card-arrow">→</div>
      </a>

      <a href="rps.html" class="card">
        <div class="card-icon" style="color: white;">🪨 📄 ✂</div>
        <div class="card-body">
          <div class="card-title">Rock Paper Scissors</div>
          <div class="card-desc">Classic 2 player game. First to three wins.</div>
        </div>
        <div class="card-arrow">→</div>
      </a>
    </div>

    <p class="footer">3 GAMES · MORE COMING SOON</p>
  </div>

</body>
</html>
